name: Deploy public/ to GitHub Pages

# GitHub Pages の deploy-from-branch は /(root) と /docs しか選べないので、
# public/ を serve するために Actions 経由でデプロイする。
# Settings → Pages → Source を「GitHub Actions」に切り替えれば有効。

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./public
      - id: deployment
        uses: actions/deploy-pages@v4
